spring:
  application:
    name: events

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: true

    consumer:
      group-id: events-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

    listener:
      ack-mode: manual
    producer:
      acks: all
      retries: 10
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${EVENTS_DB:events_db}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:admin}

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${APP_PORT:8080}

outbox:
  topic: events
  publisher:
    fixed-delay-ms: 5000
    processing-timeout-seconds: 120
    next-retry-delay-seconds: 60

topics:
  events: events
  events-retry-suffix: .retry
  events-dlq-suffix: .dlq
  results: notification-results
  results-retry-suffix: .retry
  results-dlq-suffix: .dlq

resilience4j:
  circuitbreaker:
    instances:
      kafkaPublisher:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 3
        minimum-number-of-calls: 3
        failure-rate-threshold: 100
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] traceId=%X{traceId} %logger{36} - %msg%n"
