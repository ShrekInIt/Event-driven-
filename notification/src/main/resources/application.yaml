spring:
  application:
    name: notification

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    consumer:
      group-id: notifications-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

    listener:
      ack-mode: manual

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${NOTIFICATION_DB:notification_db}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:admin}

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${NOTIFICATION_PORT:8081}

outbox:
  topic: events

processed-events:
  processing-timeout-seconds: 30

topics:
  events: events
  events-retry-suffix: .retry
  events-dlq-suffix: .dlq
  results: notification-results
  results-retry-suffix: .retry
  results-dlq-suffix: .dlq

resilience4j:
  ratelimiter:
    instances:
      smsGateway:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 0

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] traceId=%X{traceId} %logger{36} - %msg%n"
